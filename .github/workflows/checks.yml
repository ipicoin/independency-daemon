name: CI checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  setup-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Restore Go modules cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        with:
          path: /go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}

      - name: Cache go modules
        run: make go-mod-cache

      - name: Build
        run: make build

      - name: Git garbage collection
        run: git gc

      - name: Save source code cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        with:
          path: .git
          key: go-src-${{ github.sha }}


  tidy-go:
    runs-on: ubuntu-latest
    needs: setup-dependencies
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

  lint:
    runs-on: ubuntu-latest
    needs: setup-dependencies
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.2.0
        with:
          version: v2.11.3
          args: --tests=false --timeout=5m0s

  test-cover:
    runs-on: ubuntu-latest
    needs: setup-dependencies
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Restore Go modules cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        with:
          path: /go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          mkdir -p profiles logs
          export GORACE=halt_on_error=1
          export GO111MODULE=on

          FAILED=0
          SHARD_INDEX=$(( ${{ matrix.shard }} - 1 ))
          for pkg in $(go list ./... | grep -v '/simulation' | awk "NR % 4 == $SHARD_INDEX"); do
            id=$(echo "$pkg" | sed 's|[/.]|_|g')
            if ! go test -mod=readonly -timeout 8m -race -coverprofile=profiles/$id.out -covermode=atomic -tags='ledger test_ledger_mock' "$pkg" 2>&1 | tee logs/$id.log; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more test packages failed"
            exit 1
          fi

      - name: Upload coverage and logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0 # v7.0.0
        with:
          name: coverage-${{ matrix.shard }}
          path: |
            profiles/
            logs/

  upload-coverage:
    runs-on: ubuntu-latest
    needs: test-cover
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          path: artifacts

      - name: Concatenate coverage files
        run: |
          echo "mode: atomic" > coverage.txt
          find artifacts -name '*.out' | xargs -I{} tail -n +2 {} >> coverage.txt

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.txt
          fail_ci_if_error: false

  test-system:
    runs-on: ubuntu-latest
    needs: test-cover
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Restore Go modules cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        with:
          path: /go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}

      - name: Add GOBIN to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run system tests
        run: make test-system

      - name: Save artifacts on failure
        if: failure()
        run: |
          mkdir -p /tmp/test-system-artifacts
          mv tests/system/testnet /tmp/test-system-artifacts || true

      - name: Upload test system artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0 # v7.0.0
        with:
          name: test-system-artifacts
          path: /tmp/test-system-artifacts


  benchmark:
    runs-on: ubuntu-latest
    needs: test-cover
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Restore Go modules cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.0.0
        with:
          path: /go/pkg/mod
          key: go-mod-${{ hashFiles('**/go.sum') }}

      - name: Benchmarks for gas calculations
        run: |
          cd ./x/wasm/keeper
          go test -bench .

      - name: Benchmarks to compare with native modules
        run: |
          cd ./benchmarks
          go test -bench .

  simulations:
    runs-on: ubuntu-latest
    needs: setup-dependencies
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Run simulations
        run: make test-sim-deterministic test-sim-multi-seed-short test-sim-import-export

  docker-image:
    runs-on: ubuntu-latest
    needs: setup-dependencies
    env:
      IMAGE_NAME: cosmwasm/wasmd
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.0.0

      - name: Build Docker image
        run: |
          SHA=${{ github.sha }}
          docker build --pull -t $IMAGE_NAME:$SHA .

      - name: Check wasmvm version
        run: |
          SHA=${{ github.sha }}
          IN_DOCKER=$(docker run --rm $IMAGE_NAME:$SHA /usr/bin/wasmd query wasm libwasmvm-version)
          echo "Runtime libwasmvm-version in docker: $IN_DOCKER"
          IN_GOMOD=$(go list -m github.com/CosmWasm/wasmvm/v3 | cut -d" " -f2 | cut -d"v" -f2)
          echo "wasmvm version in go.mod: $IN_GOMOD"
          if [[ "$IN_DOCKER" != "$IN_GOMOD" ]]; then
            echo "Mismatch of wasmvm versions detected"
            exit 1
          fi

      - name: Login to DockerHub
        if: github.repository == 'CosmWasm/wasmd' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - name: Push Docker image
        if: github.repository == 'CosmWasm/wasmd' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          SHA=${{ github.sha }}
          docker push $IMAGE_NAME:$SHA
          if [ "${{ github.ref_name }}" = "main" ]; then
            docker tag $IMAGE_NAME:$SHA $IMAGE_NAME:latest
            docker push $IMAGE_NAME:latest
          fi
          docker logout
